<!DOCTYPE html>
<html>
<head>
  <title>PBA Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center">

<div class="card">
  <h1>PHILIPPINE BANKING ASSOCIATION</h1>

  <input id="acc" placeholder="Account Number">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Connecting to secure bank server...</p>
</div>

<script src="accounts.js"></script>

<script>
function login(){

  document.getElementById("loading").style.display = "flex";

  setTimeout(() => {

    let a = document.getElementById("acc").value;
    let p = document.getElementById("pass").value;

    let user = accounts.find(u => u.account === a && u.password === p);

    if(!user){
      alert("Invalid login");
      document.getElementById("loading").style.display = "none";
      return;
    }

    localStorage.setItem("user", JSON.stringify(user));
    window.location.href = "dashboard.html";

  }, 1500);
}
</script>

</body>
</html>
